<div id="ContentWarningsConfigPage"
     data-role="page"
     class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select,emby-checkbox">

    <div data-role="content">
        <div class="content-primary">
            <form id="ContentWarningsConfigForm">

                <h2 class="sectionTitle">Content Warnings</h2>
                <p>
                    Automatically tags movies and TV shows with content warnings
                    (e.g. <code>CW:Violence</code>, <code>CW:Language</code>) using Groq AI.
                </p>

                <input id="cwExistingKey" type="hidden" />

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="cwApiKey">Groq API Key</label>
                    <input id="cwApiKey" is="emby-input" type="password" placeholder="gsk_..." />
                    <div id="cwKeyStatus" class="fieldDescription"></div>
                    <div class="fieldDescription">
                        Free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a>
                    </div>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="cwModel">Groq Model</label>
                    <select id="cwModel" is="emby-select" class="emby-select-withcolor emby-select">
                        <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile (recommended)</option>
                        <option value="llama-3.1-8b-instant">llama-3.1-8b-instant (faster)</option>
                        <option value="llama3-70b-8192">llama3-70b-8192 (legacy)</option>
                    </select>
                </div>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input id="cwMovies" is="emby-checkbox" type="checkbox" />
                        <span>Tag Movies</span>
                    </label>
                </div>

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input id="cwTvShows" is="emby-checkbox" type="checkbox" />
                        <span>Tag TV Shows (series level)</span>
                    </label>
                </div>

                <br />

                <button is="emby-button" type="submit" class="raised button-submit block">
                    <span>Save</span>
                </button>

            </form>
        </div>
    </div>

    <script type="text/javascript">
        var ContentWarningsConfig = {
            pluginUniqueId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        };

        document.querySelector("#ContentWarningsConfigPage").addEventListener("pageshow", function () {
            Dashboard.showLoadingMsg();
            ApiClient.getPluginConfiguration(ContentWarningsConfig.pluginUniqueId).then(function (config) {
                var existing = config.GroqApiKey || "";
                document.querySelector("#cwExistingKey").value = existing;
                document.querySelector("#cwApiKey").value = "";

                var status = document.querySelector("#cwKeyStatus");
                if (existing.length > 0) {
                    document.querySelector("#cwApiKey").placeholder = "Leave blank to keep existing key";
                    status.textContent = "\u2713 API key is saved";
                    status.style.color = "green";
                } else {
                    document.querySelector("#cwApiKey").placeholder = "gsk_...";
                    status.textContent = "\u26A0 No API key set yet";
                    status.style.color = "orange";
                }

                document.querySelector("#cwModel").value     = config.GroqModel    || "llama-3.3-70b-versatile";
                document.querySelector("#cwMovies").checked  = config.EnableMovies  !== false;
                document.querySelector("#cwTvShows").checked = config.EnableTvShows !== false;

                Dashboard.hideLoadingMsg();
            });
        });

        document.querySelector("#ContentWarningsConfigForm").addEventListener("submit", function (e) {
            e.preventDefault();
            Dashboard.showLoadingMsg();

            ApiClient.getPluginConfiguration(ContentWarningsConfig.pluginUniqueId).then(function (config) {
                var typed = document.querySelector("#cwApiKey").value.trim();
                config.GroqApiKey    = typed.length > 0 ? typed : document.querySelector("#cwExistingKey").value;
                config.GroqModel     = document.querySelector("#cwModel").value;
                config.EnableMovies  = document.querySelector("#cwMovies").checked;
                config.EnableTvShows = document.querySelector("#cwTvShows").checked;

                ApiClient.updatePluginConfiguration(ContentWarningsConfig.pluginUniqueId, config).then(function (result) {
                    Dashboard.processPluginConfigurationUpdateResult(result);
                });
            });
        });
    </script>
</div>
