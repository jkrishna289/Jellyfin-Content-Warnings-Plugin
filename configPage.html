<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Content Warnings</title>
</head>
<body>
<div id="ContentWarningsConfigPage"
     data-role="page"
     class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select,emby-checkbox">

    <div data-role="content">
        <div class="content-primary">
            <form id="ContentWarningsConfigForm">

                <h2 class="sectionTitle">Content Warnings</h2>

                <p>
                    Automatically tags movies and TV shows with content warnings
                    (e.g. <code>CW:Violence</code>, <code>CW:Language</code>) using Groq AI.
                    Tags with a <code>CW:</code> prefix are never mixed with your existing tags.
                </p>

                <!-- Hidden: preserves the existing key so a blank field doesn't erase it -->
                <input id="existingKey" type="hidden" />

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="groqApiKey">Groq API Key</label>
                    <input id="groqApiKey" type="password" class="emby-input" placeholder="gsk_..." />
                    <div id="keyStatus" class="fieldDescription"></div>
                    <div class="fieldDescription">
                        Free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a>
                    </div>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="groqModel">Model</label>
                    <select id="groqModel" class="emby-select-withcolor emby-select">
                        <option value="llama3-70b-8192">llama3-70b-8192 (recommended)</option>
                        <option value="llama3-8b-8192">llama3-8b-8192 (faster)</option>
                        <option value="mixtral-8x7b-32768">mixtral-8x7b-32768</option>
                    </select>
                </div>

                <div class="checkboxContainer">
                    <label class="emby-checkbox-label">
                        <input id="enableMovies" type="checkbox" class="emby-checkbox" />
                        <span>Tag Movies</span>
                    </label>
                </div>

                <div class="checkboxContainer">
                    <label class="emby-checkbox-label">
                        <input id="enableTvShows" type="checkbox" class="emby-checkbox" />
                        <span>Tag TV Shows (series level)</span>
                    </label>
                </div>

                <br />

                <button is="emby-button" type="submit" class="raised button-submit block">
                    <span>Save</span>
                </button>

            </form>
        </div>
    </div>
</div>

<script type="text/javascript">
    var PLUGIN_ID = "a1b2c3d4-e5f6-7890-abcd-ef1234567890";

    function loadConfig(page) {
        ApiClient.getPluginConfiguration(PLUGIN_ID).then(function (config) {
            var existingKey = config.GroqApiKey || "";
            page.querySelector("#existingKey").value = existingKey;
            page.querySelector("#groqApiKey").value = "";

            var status = page.querySelector("#keyStatus");
            if (existingKey.length > 0) {
                page.querySelector("#groqApiKey").placeholder = "Leave blank to keep existing key";
                status.textContent = "\u2713 API key is saved";
                status.style.color = "green";
            } else {
                page.querySelector("#groqApiKey").placeholder = "gsk_...";
                status.textContent = "\u26A0 No API key set yet";
                status.style.color = "orange";
            }

            page.querySelector("#groqModel").value      = config.GroqModel    || "llama3-70b-8192";
            page.querySelector("#enableMovies").checked  = config.EnableMovies  !== false;
            page.querySelector("#enableTvShows").checked = config.EnableTvShows !== false;
        });
    }

    function saveConfig(page) {
        ApiClient.getPluginConfiguration(PLUGIN_ID).then(function (config) {
            var typed = page.querySelector("#groqApiKey").value.trim();
            config.GroqApiKey    = typed.length > 0 ? typed : page.querySelector("#existingKey").value;
            config.GroqModel     = page.querySelector("#groqModel").value;
            config.EnableMovies  = page.querySelector("#enableMovies").checked;
            config.EnableTvShows = page.querySelector("#enableTvShows").checked;

            ApiClient.updatePluginConfiguration(PLUGIN_ID, config).then(function () {
                Dashboard.processPluginConfigurationUpdateResult();
            });
        });
    }

    document.querySelector("#ContentWarningsConfigPage")
        .addEventListener("pageshow", function () { loadConfig(this); });

    document.querySelector("#ContentWarningsConfigForm")
        .addEventListener("submit", function (e) {
            e.preventDefault();
            saveConfig(document.querySelector("#ContentWarningsConfigPage"));
        });
</script>
</body>
</html>
