name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.ContentWarnings.csproj

      - name: Build
        run: dotnet publish Jellyfin.Plugin.ContentWarnings.csproj --configuration Release --output ./publish_output

      - name: Package as ZIP (single DLL at root, no subfolders)
        run: |
          cd publish_output
          zip ../Jellyfin.Plugin.ContentWarnings.zip Jellyfin.Plugin.ContentWarnings.dll
          cd ..
          echo "=== ZIP contents (must show only 1 file at root) ==="
          unzip -l Jellyfin.Plugin.ContentWarnings.zip

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Content Warnings Plugin ${{ steps.version.outputs.VERSION }}
          body: |
            ## Jellyfin Content Warnings Plugin ${{ steps.version.outputs.VERSION }}

            ### Installation via Jellyfin Catalog (recommended)
            1. Dashboard → Plugins → Repositories → Add:
               `https://raw.githubusercontent.com/jkrishna289/Jellyfin-Content-Warnings-Plugin/main/manifest.json`
            2. Go to Catalog → find Content Warnings → Install

            ### Manual Installation
            1. Download `Jellyfin.Plugin.ContentWarnings.zip`
            2. Extract the `.dll` to `/var/lib/jellyfin/plugins/ContentWarnings/`
            3. Restart Jellyfin
          files: Jellyfin.Plugin.ContentWarnings.zip
          draft: false
          prerelease: false
